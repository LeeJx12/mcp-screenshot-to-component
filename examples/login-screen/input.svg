<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="100%" height="100%" fill="#f9fafb"/>

  <!-- Card -->
  <rect x="240" y="120" width="320" height="400" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Logo -->
  <circle cx="400" cy="180" r="24" fill="#3b82f6"/>

  <!-- Title -->
  <rect x="300" y="232" width="200" height="20" fill="#111827"/>

  <!-- Subtitle -->
  <rect x="320" y="262" width="160" height="12" fill="#9ca3af"/>

  <!-- Email label -->
  <rect x="280" y="304" width="60" height="12" fill="#374151"/>
  <!-- Email input -->
  <rect x="280" y="324" width="240" height="40" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>

  <!-- Password label -->
  <rect x="280" y="380" width="80" height="12" fill="#374151"/>
  <!-- Password input -->
  <rect x="280" y="400" width="240" height="40" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>

  <!-- Forgot link -->
  <rect x="420" y="452" width="100" height="10" fill="#3b82f6"/>

  <!-- Submit button -->
  <rect x="280" y="478" width="240" height="42" rx="6" fill="#3b82f6"/>
</svg>
